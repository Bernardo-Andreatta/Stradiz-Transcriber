name: Build & Release

# Builds the installers for both platforms from the same source:
#   - macOS  → universal-capable arm64 + x64 DMGs (ad-hoc signed via afterPack)
#   - Windows → NSIS .exe
# Push a version tag (e.g. v1.0.1) to build and attach the installers to that
# tag's GitHub release. workflow_dispatch builds without publishing, so you can
# test artifacts from any branch.
#
# Note: the whisper/ffmpeg engine zips are NOT built here — they're separate
# maintainer assets hosted on the v1.0.0 release (see scripts/build-mac-whisper.sh).
# The app downloads them at runtime regardless of the installer's release tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Always keep the build as a downloadable workflow artifact (for testing).
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: warn

      # On a version tag, attach the installers to that release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
          fail_on_unmatched_files: false
